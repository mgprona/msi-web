<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A quiet corner of the web.">
  <title>Still Online</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #f5efe2;
      --muted: #aeb7c4;
      --line: rgba(255,255,255,.14);
      --glow: #f3c969;
      --blue: #83d8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 18%, rgba(243,201,105,.20), transparent 24rem),
        radial-gradient(circle at 80% 72%, rgba(131,216,255,.16), transparent 26rem),
        linear-gradient(135deg, #090d14, #111827 55%, #07090d);
    }
    main {
      width: min(820px, 100%);
      padding: clamp(30px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.032));
      box-shadow: 0 28px 90px rgba(0,0,0,.38);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #43d37c;
      box-shadow: 0 0 18px #43d37c;
    }
    h1 {
      margin: 0;
      max-width: 10ch;
      font-size: clamp(48px, 11vw, 116px);
      line-height: .88;
      letter-spacing: -.08em;
    }
    p {
      max-width: 620px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2.8vw, 24px);
      line-height: 1.55;
    }
    .mark {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 44px;
    }
    .mark span {
      min-height: 86px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      transition: transform .18s ease, border-color .18s ease;
    }
    .mark span:nth-child(1) { box-shadow: inset 0 0 0 1px rgba(243,201,105,.16); }
    .mark span:nth-child(2) { transform: translateY(18px); box-shadow: inset 0 0 0 1px rgba(131,216,255,.16); }
    .mark span:nth-child(3) { box-shadow: inset 0 0 0 1px rgba(255,255,255,.10); }
    .mark span:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.30);
    }
    .mark span:nth-child(2):hover { transform: translateY(10px); }
    footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 54px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 680px) {
      body { padding: 16px; }
      main { border-radius: 24px; }
      .mark { grid-template-columns: 1fr; }
      .mark span, .mark span:nth-child(2) { min-height: 58px; transform: none; }
      footer { display: block; }
      footer span { display: block; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot" aria-hidden="true"></span>Signal found</div>
    <h1>Still<br>Online.</h1>
    <p>
      A quiet corner of the web. Nothing to announce, nothing to sell —
      just a small page breathing in the dark.
    </p>
    <div class="mark" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <footer>
      <span>Say my name — since 1992.</span>
      <span>Plain HTML. Fast by default.</span>
    </footer>
  </main>
</body>
</html>
