<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Coming soon.">
  <title>Coming Soon</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --text: #f3efe7;
      --muted: #9aa6b2;
      --line: rgba(243,239,231,.16);
      --accent: #f0c66d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -20%, rgba(240,198,109,.18), transparent 34rem),
        linear-gradient(180deg, #121820 0%, var(--bg) 62%);
    }
    main {
      width: min(720px, 100%);
      padding: clamp(34px, 8vw, 72px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255,255,255,.035);
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
      text-align: center;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #47d987;
      box-shadow: 0 0 18px #47d987;
    }
    h1 {
      margin: 0;
      font-size: clamp(44px, 10vw, 88px);
      line-height: .95;
      letter-spacing: -.06em;
    }
    p {
      max-width: 560px;
      margin: 26px auto 0;
      color: var(--muted);
      font-size: clamp(18px, 3vw, 22px);
      line-height: 1.6;
    }
    .line {
      width: 72px;
      height: 2px;
      margin: 36px auto;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 24px rgba(240,198,109,.42);
    }
    footer {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot" aria-hidden="true"></span>Online since 1992</div>
    <h1>Coming<br>Soon.</h1>
    <p>
      This domain is being built quietly. A simple place for useful tools,
      clean experiments, and things worth keeping online.
    </p>
    <div class="line" aria-hidden="true"></div>
    <footer>No noise. No rush. Just building.</footer>
  </main>
</body>
</html>
